# Lightweight VPS stack: app + Caddy (TLS). No control panel.
# Usage: copy .env, set DOMAIN in Caddyfile, then:
#   docker compose up -d --build
# Auto-update from git: see deploy/update.sh + cron.

services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      # Allow the Vercel (or other) frontend origin when this host is API-only.
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    expose:
      - '3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
